name: build

# CI: cross-compile the three Windows artifacts on Linux (MinGW for the C++, dotnet for the C#).
# Read-only token; releases are a separate, tag-gated workflow (release.yml).
on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read           # least privilege — this job only reads the repo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3 (SHA-pinned)

      - name: Install the 32-bit MinGW cross-compiler (hook.dll + berkutx_loader.exe target Win x86)
        run: sudo apt-get update && sudo apt-get install -y g++-mingw-w64-i686

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5.3.0 (SHA-pinned)
        with:
          dotnet-version: '8.0.x'

      - name: Build -> dist/
        shell: pwsh
        run: ./build.ps1

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1 (SHA-pinned)
        with:
          name: disciples2-roulette-arena-template-loader
          path: dist/
