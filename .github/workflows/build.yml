name: build

# CI: cross-compile the three Windows artifacts on Linux (MinGW for the C++, dotnet for the C#).
# Read-only token; releases are a separate, tag-gated workflow (release.yml).
on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read           # least privilege — this job only reads the repo

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4 (SHA-pinned)

      - name: Install the 32-bit MinGW cross-compiler (hook.dll + berkutx_loader.exe target Win x86)
        run: sudo apt-get update && sudo apt-get install -y g++-mingw-w64-i686

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9  # v4 (SHA-pinned)
        with:
          dotnet-version: '8.0.x'

      - name: Build -> dist/
        shell: pwsh
        run: ./build.ps1

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4 (SHA-pinned)
        with:
          name: disciples2-roulette-arena-template-loader
          path: dist/
