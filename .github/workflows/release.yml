name: release

# Cuts a GitHub Release from a v* tag: builds the three artifacts, zips them with a SHA-256
# checksum, and publishes. Runs ONLY on tags, and the write permission is scoped to this one job.
on:
  push:
    tags: ['v*']

permissions:
  contents: read           # default for the workflow; the release job opts into write below

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # only this job may create the release / upload assets
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3 (SHA-pinned)

      - name: Install the 32-bit MinGW cross-compiler
        run: sudo apt-get update && sudo apt-get install -y g++-mingw-w64-i686

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2  # v5.3.0 (SHA-pinned)
        with:
          dotnet-version: '8.0.x'

      - name: Build -> dist/
        shell: pwsh
        run: ./build.ps1

      - name: Package + checksum
        shell: pwsh
        env:
          REF: ${{ github.ref_name }}    # via env, not inline ${{ }}, to avoid script injection
        run: |
          $zip = "disciples2-roulette-arena-template-loader-$env:REF.zip"
          Compress-Archive -Path dist/* -DestinationPath $zip
          "$((Get-FileHash $zip -Algorithm SHA256).Hash)  $zip" | Out-File "$zip.sha256" -Encoding ascii

      - name: Publish release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0 (SHA-pinned)
        with:
          files: |
            disciples2-roulette-arena-template-loader-*.zip
            disciples2-roulette-arena-template-loader-*.zip.sha256
          generate_release_notes: true
          body: |
            **Drop `berkutx_loader.exe` into the Disciples II game folder and run it.**
            One self-contained file — it unpacks its embedded hook + re-roller, launches the game and
            injects the hook (no arguments needed). Nothing else to install. Verify the download against
            the published SHA-256.
